name: CI

on:
  pull_request:
    branches: [main, dev, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: '0'

jobs:
  quality:
    name: Quality gates (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        node: ['22', '24']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test

      - name: Pack dry-run (validate publish payload)
        run: npm pack --dry-run

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          GITLEAKS_SHA256="ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c
          tar -xz -C /usr/local/bin gitleaks < /tmp/gitleaks.tar.gz

      - name: Scan repository for secrets
        run: gitleaks detect --config .gitleaks.toml --no-banner --verbose --redact

  npm-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ── Roll-up status check for branch protection ──────────────────────────────
  # Configure branch protection to require this single check instead of
  # tracking each matrix/job individually. If any upstream job fails, this fails.
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, secret-scan, npm-audit]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "Quality gates failed"
            exit 1
          fi
          if [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "Secret scan failed"
            exit 1
          fi
          if [[ "${{ needs.npm-audit.result }}" != "success" ]]; then
            echo "npm audit failed"
            exit 1
          fi
          echo "All CI checks passed"
