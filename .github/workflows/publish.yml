name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  HUSKY: '0'

jobs:
  # ── Gate: secret scan + quality on source before any publish ───────────────
  secret-scan:
    name: Secret scan + quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          GITLEAKS_SHA256="ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c
          tar -xz -C /usr/local/bin gitleaks < /tmp/gitleaks.tar.gz

      - name: Scan repository source for secrets
        run: gitleaks detect --config .gitleaks.toml --no-banner --verbose --redact

      - name: Validate publish payload — no .env files
        run: |
          PAYLOAD=$(npm pack --dry-run 2>&1)
          if echo "$PAYLOAD" | grep -qE '(^|\s)\.env'; then
            echo "ERROR: .env files detected in publish payload"
            echo "$PAYLOAD"
            exit 1
          fi
          echo "Publish payload clean."

  # ── Publish job ────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: secret-scan
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 400
          if-no-files-found: error

      - name: Version and Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          version: npm run changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # ── Publish audit record ──────────────────────────────────────────────
      - name: Emit publish audit record
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version" | tr -cd '0-9a-zA-Z._-')
          node -e "
            const d = {
              ts: new Date().toISOString(),
              event: 'npm_publish',
              package: '@bookedsolid/reagent',
              version: process.env.PKG_VERSION,
              run_id: process.env.RUN_ID,
              sha: process.env.SHA,
              actor: process.env.ACTOR,
              sbom_artifact: 'sbom-' + process.env.SHA
            };
            console.log('AUDIT: ' + JSON.stringify(d));
          "
        env:
          PKG_VERSION: ${{ steps.changesets.outputs.publishedPackages && fromJSON(steps.changesets.outputs.publishedPackages)[0].version || 'unknown' }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}

      # ── Discord: dev channel ──────────────────────────────────────────────
      - name: Notify Discord dev channel
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        run: |
          npm install --no-save discord-ops@0.21.1
          node --input-type=module -e "
            import { loadConfig, DiscordClient, allTools } from 'discord-ops';
            const v = process.env.VERSION;
            const config = await loadConfig();
            const discord = new DiscordClient();
            const ctx = { discord, config };
            const tool = allTools.find(t => t.name === 'send_message');
            await tool.handle({
              project: 'reagent',
              channel: 'dev',
              content: '\u{1f4e6} **@bookedsolid/reagent v' + v + '** published to npm'
            }, ctx);
            await discord.destroy();
          "
        env:
          VERSION: ${{ steps.changesets.outputs.publishedPackages && fromJSON(steps.changesets.outputs.publishedPackages)[0].version || 'unknown' }}
          BOOKED_DISCORD_BOT_TOKEN: ${{ secrets.BOOKED_DISCORD_BOT_TOKEN }}
          DISCORD_OPS_CONFIG: ${{ secrets.DISCORD_OPS_CONFIG }}

      # ── Discord: releases channel ─────────────────────────────────────────
      - name: Notify Discord releases channel
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        run: |
          npm install --no-save discord-ops@0.21.1
          node --input-type=module -e "
            import { loadConfig, DiscordClient, allTools } from 'discord-ops';
            const v = process.env.VERSION;
            const config = await loadConfig();
            const discord = new DiscordClient();
            const ctx = { discord, config };
            const tool = allTools.find(t => t.name === 'send_embed');
            await tool.handle({
              project: 'reagent',
              channel: 'releases',
              title: '\u{1f4e6} @bookedsolid/reagent v' + v,
              description: 'Zero-trust agentic framework update',
              fields: [
                { name: 'npm', value: '@bookedsolid/reagent@latest' },
                { name: 'Install', value: 'npm i @bookedsolid/reagent@' + v }
              ],
              url: 'https://github.com/bookedsolidtech/reagent/releases/tag/@bookedsolid/reagent@' + v,
              footer: 'Published via CI'
            }, ctx);
            await discord.destroy();
          "
        env:
          VERSION: ${{ steps.changesets.outputs.publishedPackages && fromJSON(steps.changesets.outputs.publishedPackages)[0].version || 'unknown' }}
          BOOKED_DISCORD_BOT_TOKEN: ${{ secrets.BOOKED_DISCORD_BOT_TOKEN }}
          DISCORD_OPS_CONFIG: ${{ secrets.DISCORD_OPS_CONFIG }}
