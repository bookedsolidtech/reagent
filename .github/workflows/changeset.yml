name: Changeset check

on:
  pull_request:
    branches: [main]

env:
  HUSKY: '0'

jobs:
  changeset:
    name: Require changeset
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for changeset
        # Skip for Changesets' own release branch and PRs labelled skip-changeset
        if: |
          !startsWith(github.head_ref, 'changeset-release/') &&
          !contains(github.event.pull_request.labels.*.name, 'skip-changeset')
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          # Files that never need a changeset entry:
          #   - Changeset files / CHANGELOG / package.json (managed by Changesets itself)
          #   - CI/CD workflows and GitHub config (.github/)
          #   - Developer tooling config (gitignore, prettier, eslint, tsconfig, etc.)
          #   - Documentation site (docs/)
          #   - Lock files
          INFRA_PATTERN='^(\.changeset/|CHANGELOG\.md|package\.json|\.github/|\.gitignore|\.npmignore|\.prettierignore|\.eslintignore|\.gitleaks\.toml|tsconfig|\.husky/|docs/|.*\.lock$)'

          SRC_CHANGED=$(echo "$CHANGED" | grep -vE "$INFRA_PATTERN" | head -1 || true)

          if [ -n "$SRC_CHANGED" ]; then
            CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | wc -l | tr -d ' ')
            if [ "$CHANGESETS" -eq 0 ]; then
              echo ""
              echo "ERROR: Source files changed but no changeset found."
              echo "  First changed source file: $SRC_CHANGED"
              echo ""
              echo "Add a changeset before merging:"
              echo "  npx changeset"
              echo ""
              echo "Or label this PR 'skip-changeset' if it truly needs no changelog entry."
              exit 1
            fi
            echo "Changeset found ($CHANGESETS file(s)). OK."
          else
            echo "No source changes requiring a changeset (infra/config/docs only). Skipping."
          fi
