name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write   # Required for npm provenance attestation (sigstore/OIDC)

env:
  HUSKY: '0'  # Prevent husky hooks running in CI

jobs:
  # ── Gate: secret scan + quality on source before any publish ─────────────────
  secret-scan:
    name: Secret scan + quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan repository source for secrets
        run: gitleaks detect --config .gitleaks.toml --no-banner --verbose --redact

      - name: Validate publish payload — no .env files
        run: |
          PAYLOAD=$(npm pack --dry-run 2>&1)
          if echo "$PAYLOAD" | grep -qE '(^|\s)\.env'; then
            echo "ERROR: .env files detected in publish payload"
            echo "$PAYLOAD"
            exit 1
          fi
          echo "Publish payload clean."

  # ── Publish job ───────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: secret-scan
    environment: npm-publish  # requires manual approval gate in GitHub repo settings

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 400   # SOC 2 Type II 12-month observation window
          if-no-files-found: error

      - name: Version and Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          version: npm run changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # ── Publish audit record ────────────────────────────────────────────────
      - name: Emit publish audit record
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RECORD=$(node -e "
            const d = {
              ts: new Date().toISOString(),
              event: 'npm_publish',
              package: '@bookedsolid/reagent',
              version: process.env.VERSION,
              run_id: process.env.RUN_ID,
              sha: process.env.SHA,
              actor: process.env.ACTOR,
              sbom_artifact: 'sbom-' + process.env.SHA
            };
            console.log(JSON.stringify(d));
          ")
          echo "AUDIT: $RECORD"
          # Phase 2: POST to OTel collector or append to audit branch
        env:
          VERSION: ${{ steps.changesets.outputs.publishedPackages && fromJson(steps.changesets.outputs.publishedPackages)[0].version || 'unknown' }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}

      # ── Discord: dev channel ────────────────────────────────────────────────
      - name: Notify Discord dev channel
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx discord-ops@latest run send_message --args "{\"project\":\"reagent\",\"channel\":\"dev\",\"content\":\"📦 **@bookedsolid/reagent v${VERSION}** published to npm\"}"
        env:
          BOOKED_DISCORD_BOT_TOKEN: ${{ secrets.BOOKED_DISCORD_BOT_TOKEN }}
          DISCORD_OPS_CONFIG: ${{ secrets.DISCORD_OPS_CONFIG }}

      # ── Discord: releases channel ───────────────────────────────────────────
      - name: Notify Discord releases channel
        if: steps.changesets.outputs.published == 'true'
        run: |
          PUBLISHED='${{ steps.changesets.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d[0]?.version||'unknown')")
          npx discord-ops@latest run send_template --args "{
            \"project\": \"reagent\",
            \"channel\": \"releases\",
            \"template\": \"release\",
            \"vars\": {
              \"name\": \"@bookedsolid/reagent\",
              \"version\": \"v${VERSION}\",
              \"author_name\": \"Booked Solid Technology\",
              \"highlights\": \"Zero-trust agentic framework update\",
              \"npm\": \"@bookedsolid/reagent@latest\",
              \"npm_url\": \"https://www.npmjs.com/package/@bookedsolid/reagent\",
              \"link\": \"https://github.com/bookedsolidtech/reagent/releases/tag/@bookedsolid/reagent@${VERSION}\",
              \"footer\": \"Published via CI\"
            }
          }"
        env:
          BOOKED_DISCORD_BOT_TOKEN: ${{ secrets.BOOKED_DISCORD_BOT_TOKEN }}
          DISCORD_OPS_CONFIG: ${{ secrets.DISCORD_OPS_CONFIG }}
